<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      line-height: 1.7;
      color: #222;
      background: #f7f9fc;
    }
    header {
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #ddd;
    }
    nav a {
      margin-right: 16px;
      text-decoration: none;
      color: #0b63c9;
    }
    nav a:hover {
      text-decoration: underline;
    }
    main {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }
    .meta {
      color: #667085;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="{{ '/' | relative_url }}">首页</a>
      <a href="{{ '/docs/' | relative_url }}">文档</a>
      <a href="{{ '/docs/architecture/' | relative_url }}">代码地图</a>
      <a href="{{ '/research.html' | relative_url }}">归档</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>
</body>
</html>
